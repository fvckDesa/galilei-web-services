apiVersion: v1
kind: ConfigMap
metadata:
  name: web
data:
  API_URL: http://api.default.svc.cluster.local
  NEXT_PUBLIC_HOST_DOMAIN: gws.local
  NEXT_PUBLIC_API_URL: https://api.galilei-web-services.local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: fvckdesa/gws-web
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: web
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector:
    app: web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect@kubernetescrd
    traefik.ingress.kubernetes.io/router.entrypoints: web, websecure
    cert-manager.io/cluster-issuer: ca-issuer
    cert-manager.io/common-name: galilei-web-services.local
    cert-manager.io/subject-organizations: GWS
spec:
  tls:
    - hosts:
        - galilei-web-services.local
      secretName: web-tls-secret
  rules:
    - host: galilei-web-services.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
